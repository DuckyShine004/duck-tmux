unbind r

bind r source-file ~/.config/tmux/tmux.conf

# Set terminal environment and profile
set -g default-shell /bin/zsh
set -g default-command "/bin/zsh -l"

# Mac path and environment
if-shell 'uname -s | grep -qi darwin' \
  'set-environment -g PATH "/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:$PATH"'

set -g update-environment "PATH SSH_AUTH_SOCK DISPLAY XAUTHORITY TERMINFO"

# Bind prefix to ctrl + e
set -g prefix C-e

set -g mouse on

# Set terminal colours
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'
set-environment -g COLORTERM "truecolor"

# Image preview
set -gq allow-passthrough on
set -g visual-activity off
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Navigate between panes
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Competitive programming window splits
bind-key y split-window -h -p 30 -c "#{pane_current_path}" \;\
    split-window -v -p 67 -c "#{pane_current_path}" \;\
    split-window -v -c "#{pane_current_path}" \;\
    select-pane -t 0

bind-key Y split-window -h -p 30 -c "#{pane_current_path}" \;\
    split-window -v -c "#{pane_current_path}" \;\
    select-pane -t 0

bind-key | split-window -h -c "#{pane_current_path}"
bind-key _ split-window -v -c "#{pane_current_path}"

# Create new pane
bind c new-window -c "#{pane_current_path}"

# Kill the current window and pane
bind d kill-window

# Kill the current pane
bind x kill-pane

# Hide copy mode position
set -g copy-mode-position-format ""

# Toggle the status bar
bind b set -g status #{?#{==:#{status},on},off,on}

# Status bar customisation
set-option -g status-position bottom

# Renumber window indices
set-option -g renumber-windows on

# Turn on automatic rename
set -g status-interval 1

set -g allow-rename on
set -g focus-events on

# Styling
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'

# Tmux
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'b0o/tmux-autoreload'

# Other tools
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'alexwforsythe/tmux-which-key'

# Autoreload
set -g @tmux-autoreload-quiet 1

# Tmux floating terminal
set -g @floax-bind 'C-f'
set -g @floax-bind-menu 'T'

# WARN: OVERRIDE PLUGIN KEYBINDS
bind p previous-window

run '~/.tmux/plugins/tpm/tpm'

# Custom tab
set -g @tab_bg_active "#cba6f7"
set -g @tab_fg_active "#11111b"
set -g @tab_bg_inactive "#181825"
set -g @tab_fg_inactive "#cdd6f4"
set -g @tab_bar_bg "default"
set -g @tab_accent "#f9e2af"
set -g @tab_inactive_separator "#11111b"
set -g @catppuccin_status_background "default"

# Clear left/right status modules completely
set -g status-left ""
set -g status-right ""
set -g status-left-length 0
set -g status-right-length 0
set-option -g status-style bg=default

# Center window list
set -g status-justify centre

set -g status-style "bg=#{E:@tab_bar_bg},fg=#{E:@tab_fg_inactive}"
set -g window-status-separator ""

# Inactive windows
set -g window-status-format "\
#[fg=#{E:@tab_bg_inactive},bg=#{E:@tab_bar_bg}]#{?#{==:#{window_index},0},,}\
#[fg=#{E:@tab_fg_inactive},bg=#{E:@tab_bg_inactive}] \
#(~/.config/tmux/scripts/superscript.sh #{window_index})  #(~/.config/tmux/scripts/layout.sh '#{window_layout}' #{window_panes})#(~/.config/tmux/scripts/subscript.sh #{window_panes}) 󰉋 #{b:pane_current_path} \
#[fg=#{E:@tab_bg_inactive},bg=#{?#{==:#{window_index},#{e|-|:#{session_windows},1}},#{E:@tab_bar_bg},#{?#{==:#{e|+|:#{window_index},1},#{active_window_index}},#{E:@tab_bg_active},#{E:@tab_bg_inactive}}}]\
#[fg=#{E:@tab_inactive_separator},bg=#{E:@tab_bg_inactive}]#{?#{||:#{==:#{window_index},#{e|-|:#{session_windows},1}},#{==:#{e|+|:#{window_index},1},#{active_window_index}}},,}"

# Active window
set -g window-status-current-format "\
#[fg=#{E:@tab_bg_active},bg=#{E:@tab_bar_bg}]#{?#{==:#{window_index},0},,}\
#[fg=#{E:@tab_fg_active},bg=#{E:@tab_bg_active},italics]#{?#{==:#{window_index},0},, }\
#(~/.config/tmux/scripts/superscript.sh #{window_index})  #(~/.config/tmux/scripts/layout.sh '#{window_layout}' #{window_panes})#(~/.config/tmux/scripts/subscript.sh #{window_panes}) 󰉋 #{b:pane_current_path} \
#[fg=#{E:@tab_bg_active},bg=#{E:@tab_bg_inactive},noitalics]"
